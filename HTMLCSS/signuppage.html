<html>
  <head>
    <title>signup_page</title>
  </head>
  <body>
    <h1>Signup Form</h1>
    <form>
      <p
        style="
          background-color: lightgray;
          font-size: 20px;
          color: black;
          text-align: center;
        "
      >
        Username: <input type="text" placeholder="username" />
      </p>
      <p
        style="
          background-color: lightblue;
          font-size: 30px;
          color: Red;
          text-align: center;
        "
      >
        Password: <input type="password" placeholder="password" />
      </p>
      <p
        style="
          background-color: lightblue;
          font-size: 20px;
          color: Red;
          text-align: center;
        "
      >
        Mobile number : <input type="number" placeholder="123456789" />
      </p>
      <p><input type="submit" /> <input type="reset" /></p>
    </form>
  </body>
</html>
