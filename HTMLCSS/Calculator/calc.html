<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        background-color: #2c3947;
        /* width: 260px; */
      }
      .container .outputcontainer {
        /* background-color: #526376; */
        /* height: 100px; */
        margin: 0;
        padding: 0;
      }
      .outputcontainer .userinput {
        width: calc(100% - 40px);
        display: block;

        /* height: 40px; */

        background-color: #2c3947;
        color: white;
        font-size: 50px;
        text-align: right;
        padding: 10px 20px;
      }
      .outputcontainer .outputtext {
        color: white;
        /* font-size: 30px; */
        text-align: right;
        padding: 10px 20px;
      }

      .btncontainer {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr;
        padding: 40px 20px;
        row-gap: 10px;
        column-gap: 10px;
      }
      .btn {
        background-color: #526376;
        color: white;
        height: 50px;
        width: 50px;
        border-radius: 12px;
        border: none;
        box-shadow: 0px 0px 2px 1px #2c3947;
        font-size: 20px;
        cursor: pointer;
      }
      .zero {
        grid-column-start: 1;
        grid-column-end: 3;
        width: 100%;
      }
      .btn-gray {
        background-color: rgb(203, 203, 203);
      }
      .btn-orange {
        background-color: #ff9e20;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="outputcontainer">
        <p class="outputtext"></p>
        <span class="userinput" type="number"></span>
      </div>
      <div class="btncontainer">
        <button class="btn btn-gray">C</button
        ><button class="btn btn-gray">+/-</button
        ><button class="btn btn-gray">%</button
        ><button class="btn btn-orange">/</button>

        <button class="btn">7</button><button class="btn">8</button
        ><button class="btn">9</button><button class="btn btn-orange">X</button>

        <button class="btn">4</button><button class="btn">5</button
        ><button class="btn">6</button><button class="btn btn-orange">-</button
        ><button class="btn">1</button><button class="btn">2</button
        ><button class="btn">3</button><button class="btn btn-orange">+</button
        ><button class="btn zero">0</button><button class="btn">.</button
        ><button class="btn btn-orange">=</button>
      </div>
    </div>
    <script>
      document.querySelectorAll(".btn").forEach((button) => {
        button.addEventListener("click", () => {
          const userInput = document.querySelector(".userinput");
          const outputText = document.querySelector(".outputtext");
          const buttonValue = button.textContent;

          if (buttonValue === "C") {
            userInput.textContent = "";
            outputText.textContent = "";
          } else if (buttonValue === "=") {
            try {
              const result = eval(userInput.textContent);
              outputText.textContent = result;
            } catch (error) {
              outputText.textContent = "Error";
            }
          } else {
            userInput.textContent += buttonValue;
          }
        });
      });
    </script>
  </body>
</html>
