<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MarginPaddingBorder</title>
    <style>
      div {
        margin: 10px;
        border: 2px solid red;
        border-radius: 5px;
        background-color: lightgreen;
        padding: 10px;
      }
      #div1 {
        /* margin: 20px; */
        margin-bottom: 20px;
        border: 1px dashed blue;
        padding-left: 100px;
      }
      #div2 {
        /* margin: 20px; */
        margin-top: 30px;
        border: 1px dotted black;
        padding-right: 100px;
        text-align: right;
      }
      #div3 {
        padding: 0px;
        padding-top: 10px;
      }
    </style>
  </head>
  <body>
    <div id="div1">div1</div>
    <div id="div2">div2</div>
    <div id="div3">div3</div>
  </body>
</html>
