<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyLandingPage</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: consolas;
        line-height: 1.6;
        color: white;
      }
      header {
        background-color: #222;
      }
      header h1 {
        display: inline-block;
        /* margin-right: 400px; */
        font-size: 24px;
        margin-left: 10px;
      }
      .nav-links {
        display: inline-block;
        float: right;
        margin-top: 8px;
        margin-right: 10px;
      }
      .nav-links a {
        color: white;
        text-decoration: none;
      }
      .nav-links a:hover {
        color: #ffcc00;
      }
      .sec1 {
        background-color: #ffcc00;
        text-align: center;
        height: 200px;
      }
      .sec1 h2 {
        color: #222;
        font-size: 20px;
        padding-top: 40px;
      }
      .sec1 p {
        color: #222;
        font-size: 12px;
        /* max-width: 200px; */
      }
      .sec1 a {
        text-decoration: none;
        color: white;
        background-color: #222;
        font-size: 10px;
        padding: 5px;
        border-radius: 5px;
      }
      .sec1 a:hover {
        background-color: #222222c3;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>MyPage</h1>
      <nav class="nav-links">
        <a href="#Home">Home</a>
        <a href="#Features">Features</a>
        <a href="#About">About</a>
      </nav>
    </header>

    <section class="sec1" id="Home">
      <h2>Welcome to MySite</h2>
      <p>A simple landing page built for practicing HTML and CSS.</p>
      <a href="#Features">Learn More</a>
    </section>
  </body>
</html>
